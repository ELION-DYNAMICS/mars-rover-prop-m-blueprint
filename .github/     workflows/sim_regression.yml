name: Simulation Regression

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    # nightly at 02:00 UTC
    - cron: "0 2 * * *"

concurrency:
  group: sim-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sim-regression:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        ros_distro: [ humble ]
        scenario: [ mars_flat ]   # add mars_rocks, lander_tether_site later

    env:
      ROS_DISTRO: ${{ matrix.ros_distro }}
      ROS_WS: rover_ws
      SCENARIO: ${{ matrix.scenario }}
      # determinism for regression
      SEED: "42"
      RUN_SECONDS: "45"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ROS 2
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.ros_distro }}

      - name: Install system dependencies (ROS + tools)
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-pip python3-venv python3-rosdep \
            python3-colcon-common-extensions \
            python3-vcstool \
            xvfb \
            ros-${ROS_DISTRO}-ros-base \
            ros-${ROS_DISTRO}-rosbag2 \
            ros-${ROS_DISTRO}-rosbag2-storage-mcap \
            ros-${ROS_DISTRO}-robot-localization \
            ros-${ROS_DISTRO}-nav2-bringup \
            ros-${ROS_DISTRO}-ros2-control \
            ros-${ROS_DISTRO}-ros2-controllers

      - name: Init rosdep
        shell: bash
        run: |
          sudo rosdep init || true
          rosdep update

      - name: Resolve ROS dependencies (rosdep)
        shell: bash
        run: |
          cd "${ROS_WS}"
          rosdep install --from-paths src --ignore-src -r -y

      - name: Build workspace
        shell: bash
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          cd "${ROS_WS}"
          colcon build --event-handlers console_direct+ --symlink-install

      - name: Pre-flight checks (required scripts/files)
        shell: bash
        run: |
          set -e
          test -d "scenarios/${SCENARIO}" || (echo "Missing scenarios/${SCENARIO}" && exit 1)
          test -f "scripts/run_sim_batch.py" || (echo "Missing scripts/run_sim_batch.py (required)" && exit 1)
          test -f "scripts/evaluate_metrics.py" || (echo "Missing scripts/evaluate_metrics.py (required)" && exit 1)
          test -f "datasets/schemas/run_metadata.schema.json" || (echo "Missing datasets/schemas/run_metadata.schema.json (required)" && exit 1)

      - name: Run scenario (headless)
        shell: bash
        run: |
          set -e
          source /opt/ros/${ROS_DISTRO}/setup.bash
          cd "${ROS_WS}"
          source install/setup.bash
          cd ..
          # Headless: use xvfb to prevent GUI requirements
          xvfb-run -a python3 scripts/run_sim_batch.py \
            --backend gazebo \
            --scenario "${SCENARIO}" \
            --seed "${SEED}" \
            --duration "${RUN_SECONDS}" \
            --output_dir "datasets"

      - name: Evaluate metrics (gate)
        shell: bash
        run: |
          set -e
          python3 scripts/evaluate_metrics.py \
            --dataset_root "datasets" \
            --scenario "${SCENARIO}" \
            --seed "${SEED}" \
            --thresholds "scenarios/${SCENARIO}/scenario.yaml"

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-regression-${{ matrix.ros_distro }}-${{ matrix.scenario }}
          path: |
            datasets/**
            rover_ws/log/**
          if-no-files-found: ignore
