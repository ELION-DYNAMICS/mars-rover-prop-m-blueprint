name: CI (colcon)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ci-colcon-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        ros_distro: [ humble ]   # LTS. Change to iron/jazzy if you standardize later.

    env:
      ROS_DISTRO: ${{ matrix.ros_distro }}
      ROS_WS: ros_ws
      COLCON_SKIP_PACKAGES: rover_sim_gazebo
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ROS 2
        uses: ros-tooling/setup-ros@0.7.15
        with:
          required-ros-distributions: ${{ matrix.ros_distro }}

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-pip \
            python3-rosdep \
            python3-colcon-common-extensions \
            python3-vcstool \
            ros-${ROS_DISTRO}-ros-base

      - name: Init rosdep
        shell: bash
        run: |
          sudo rosdep init || true
          rosdep update

      - name: Resolve ROS dependencies (rosdep)
        shell: bash
        run: |
          cd "${ROS_WS}"
          rosdep install --from-paths src --ignore-src -r -y \
            --dependency-types=buildtool \
            --dependency-types=build \
            --dependency-types=build_export \
            --dependency-types=test

      - name: Build
        shell: bash
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          cd "${ROS_WS}"
          set +e
          colcon build \
            --packages-skip ${COLCON_SKIP_PACKAGES} \
            --event-handlers console_direct+ \
            --symlink-install
          build_status=$?
          set -e

          if [ "${build_status}" -ne 0 ]; then
            echo
            echo "colcon build failed; printing package logs from log/latest_build."
            if [ -e "log/latest_build" ]; then
              find -L log/latest_build -type f \( -name stderr.log -o -name stdout.log \) | sort | while read -r logfile; do
                echo
                echo "===== ${logfile} ====="
                cat "${logfile}" || true
              done
            else
              echo "No log/latest_build directory found."
            fi
            exit "${build_status}"
          fi

      - name: Test
        shell: bash
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          cd "${ROS_WS}"
          source install/setup.bash
          colcon test \
            --packages-skip ${COLCON_SKIP_PACKAGES} \
            --event-handlers console_direct+ \
            --return-code-on-test-failure

      - name: Test Results
        if: always()
        shell: bash
        run: |
          if [ ! -f "/opt/ros/${ROS_DISTRO}/setup.bash" ]; then
            echo "ROS environment not available; skipping test-result summary."
            exit 0
          fi
          source /opt/ros/${ROS_DISTRO}/setup.bash
          if [ ! -d "${ROS_WS}" ]; then
            echo "Workspace directory ${ROS_WS} not available; skipping test-result summary."
            exit 0
          fi
          cd "${ROS_WS}"
          colcon test-result --verbose || true

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: colcon-test-logs-${{ matrix.ros_distro }}
          path: |
            ros_ws/log
            ros_ws/build/**/Testing
          if-no-files-found: ignore
