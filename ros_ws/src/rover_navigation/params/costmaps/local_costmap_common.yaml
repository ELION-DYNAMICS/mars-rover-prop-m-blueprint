local_costmap:
  local_costmap:
    ros__parameters:
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6.0
      height: 6.0
      resolution: 0.05
      update_frequency: 10.0
      publish_frequency: 5.0
      robot_radius: 0.20

      plugins: ["voxel_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: false
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 10
        max_obstacle_height: 0.5
        mark_threshold: 0
        # Sensor sources should be added later:
        # observation_sources: scan
        # scan:
        #   topic: /scan
        #   max_obstacle_height: 0.5
        #   clearing: true
        #   marking: true
        #   data_type: LaserScan

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55
        cost_scaling_factor: 4.0
