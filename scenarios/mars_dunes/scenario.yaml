name: mars_dunes
version: "0.1"
description: >
  Mobility stress scenario on low-traction dune-like regolith.
  Focus: slip, sinkage, traction control stability, and dataset reproducibility.

defaults:
  mode: modern
  backend: gazebo
  map: map/map.yaml
  world_gazebo: worlds/gazebo/mars_dunes.sdf

environment:
  gravity_mps2: 3.711
  terrain_preset:
    modern: regolith_loose
    prop_m: regolith_loose

initial_conditions:
  spawn_pose_map: [-6.0, 0.0, 0.0]   # x[m], y[m], yaw[rad]
  seed: 1337

mission:
  cycle:
    stop_measure_duration_s:
      modern: 3.0
      prop_m: 8.0
    transmit_duration_s:
      modern: 4.0
      prop_m: 6.0
    drive_timeout_s:
      modern: 180.0
      prop_m: 45.0

waypoints:
  traverse_1: [0.0,  0.0, 0.0]
  traverse_2: [6.0,  1.0, 0.0]
  traverse_3: [12.0, -1.0, 0.0]
  safe_hold:  [-2.0, 0.0, 0.0]

nav2:
  inflation_radius_m:
    modern: 0.55
    prop_m: 0.70
  local_costmap:
    width_m:
      modern: 6.0
      prop_m: 4.0
    height_m:
      modern: 6.0
      prop_m: 4.0
